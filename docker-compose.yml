version: '3.8'

services:
  # ===========================================
  # BASE DE DATOS - PostgreSQL
  # ===========================================
  db:
    image: postgres:15-alpine
    container_name: athena_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-athena_erp}
      POSTGRES_USER: ${POSTGRES_USER:-athena_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-athena_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_EXTERNAL_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-athena_user} -d ${POSTGRES_DB:-athena_erp}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # BACKEND - Django
  # ===========================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: athena_backend
    restart: unless-stopped
    volumes:
      - ./backend:/app
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DJANGO_DEBUG: ${DJANGO_DEBUG:-True}
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-dev-secret-key-change-in-production}
      DATABASE_URL: postgres://${POSTGRES_USER:-athena_user}:${POSTGRES_PASSWORD:-athena_password}@db:5432/${POSTGRES_DB:-athena_erp}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    depends_on:
      db:
        condition: service_healthy
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"

  # ===========================================
  # FRONTEND - React + Vite
  # ===========================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: athena_frontend
    restart: unless-stopped
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:${BACKEND_PORT:-8000}/api
    depends_on:
      - backend
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
    driver: local